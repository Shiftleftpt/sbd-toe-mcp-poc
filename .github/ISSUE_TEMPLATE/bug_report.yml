name: Bug report
description: Reportar bug técnico, falha de runtime, problema de packaging ou integração MCP
title: "[Bug]: "
labels: ["tipo:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pelo reporte.

        Para vulnerabilidades, não uses esta template. Segue o processo privado em `SECURITY.md`.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmações iniciais
      options:
        - label: Procurei issues já existentes
          required: true
        - label: Confirmei que este reporte não é uma vulnerabilidade de segurança
          required: true
  - type: dropdown
    id: install_mode
    attributes:
      label: Modo de instalação
      description: Como estás a executar o servidor?
      options:
        - GitHub Release bundle
        - Source checkout
        - Outro
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Versão ou tag
      placeholder: "ex: v0.1.0"
  - type: input
    id: vscode
    attributes:
      label: Versão do VS Code
      placeholder: "ex: 1.99.0"
  - type: input
    id: node
    attributes:
      label: Versão de Node.js
      placeholder: "ex: 20.11.1"
  - type: input
    id: os
    attributes:
      label: Sistema operativo
      placeholder: "ex: macOS 15, Ubuntu 24.04, Windows 11"
  - type: textarea
    id: current
    attributes:
      label: Comportamento atual
      description: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Configurar MCP no VS Code
        2. Fazer a pergunta X
        3. Ver erro Y
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, erros ou output relevante
      render: shell
  - type: checkboxes
    id: coc
    attributes:
      label: Código de conduta
      options:
        - label: Concordo em seguir o Código de Conduta deste projeto
          required: true
