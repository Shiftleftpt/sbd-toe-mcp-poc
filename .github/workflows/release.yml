name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      RELEASE_OUTPUT_DIR: release

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tagged commit
        run: |
          npm run check
          npm run build

      - name: Verify tag is on master
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git fetch --no-tags --prune origin +refs/heads/master:refs/remotes/origin/master

          if ! git merge-base --is-ancestor "refs/tags/${{ github.ref_name }}" refs/remotes/origin/master; then
            echo "Error: Tag ${{ github.ref_name }} is not on master branch"
            exit 1
          fi

      - name: Build release bundle
        run: node scripts/package-release.mjs --version "${GITHUB_REF_NAME}" --output-dir "${RELEASE_OUTPUT_DIR}"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets=("${RELEASE_OUTPUT_DIR}"/*)

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
