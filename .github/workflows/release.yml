name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write  # required for npm Trusted Publishing (OIDC)
    env:
      RELEASE_OUTPUT_DIR: release

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate tagged commit
        run: |
          npm run check
          npm run build

      - name: Verify tag is on master
        run: |
          if ! git merge-base --is-ancestor "${{ github.ref_name }}" refs/remotes/origin/master; then
            echo "Error: Tag ${{ github.ref_name }} is not on master branch"
            exit 1
          fi

      - name: Build release bundle
        run: node scripts/package-release.mjs --version "${GITHUB_REF_NAME}" --output-dir "${RELEASE_OUTPUT_DIR}"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets=("${RELEASE_OUTPUT_DIR}"/*)

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Publish to npm
        # Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
        # setup-node writes an .npmrc _authToken template that evaluates to an
        # empty string when NODE_AUTH_TOKEN is unset, blocking the OIDC exchange.
        # We delete it explicitly so npm falls back to OIDC (id-token: write above).
        run: |
          npm config delete //registry.npmjs.org/:_authToken
          npm publish --access public --provenance
