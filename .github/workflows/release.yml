name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    env:
      RELEASE_OUTPUT_DIR: release

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Validate stable tag format
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: stable npm publish only accepts tags in the form vX.Y.Z"
            echo "Use the preview bundle workflow for development or prerelease builds."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate tagged commit
        run: |
          npm run check
          npm run build
          npm run check:npm-package

      - name: Verify tag is on master
        run: |
          if ! git merge-base --is-ancestor "${{ github.ref_name }}" refs/remotes/origin/master; then
            echo "Error: Tag ${{ github.ref_name }} is not on master branch"
            exit 1
          fi

      - name: Build release bundle
        run: node scripts/package-release.mjs --version "${GITHUB_REF_NAME}" --output-dir "${RELEASE_OUTPUT_DIR}"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets=("${RELEASE_OUTPUT_DIR}"/*)

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")
          if [[ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Error: package.json version is ${PACKAGE_VERSION}, but the pushed tag is ${GITHUB_REF_NAME}"
            echo "Keep package.json version and git tag in sync before releasing."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
